  "expected_response": "When you step back and look at all of this \u2014 what's this really about for you? Answer in terms of what matters to you or what you're missing \u2014 not what's wrong with them.\nThe user responds in their own words. If the user answers in terms of the other person (e.g. blame, traits, or demands), the AI redirects:\n\"I hear that. Let me bring it back to you for a second \u2014 when that happens, what feels important or missing for you?\"\nIf the user returns repeatedly to strategy or demand framing after redirection, MWF does not treat this as a failure state or push harder. It continues reflecting the feeling underneath the strategy \u2014 not the strategy itself \u2014 and stays patient. The goal is to find the need, however long that takes. Some users arrive at it directly; others circle it many times before it surfaces.\nAs the user clarifies, the AI helps refine the underlying meaning:\n- It reflects what it hears\n- It translates toward clear, universal human needs\n- It avoids strategies (\"I need them to\u2026\") and redirects them\n- It avoids judgments and reframes them\n- It offers language as a suggestion, not a correction\nExamples:\n- \"It sounds like wanting to feel taken seriously \u2014 does that fit?\"\n- \"Is this about wanting more support, or something slightly different?\"\nThe user confirms, rejects, or refines until it feels accurate. A valid expression at this stage does not depend on a specific person acting a specific way.\nOnce clear, the AI summarizes what matters to the user and asks for confirmation.\n### The Needs Share\nBoth needs summaries are held until both users complete and confirm Stage 3. Then each user is asked for consent to share their summary with their partner, following the same pattern as the empathy consent in Stage 2: the AI names exactly what it would share, and the user explicitly approves before anything is sent.\nOnce both users consent, each sees the other's needs summary side by side