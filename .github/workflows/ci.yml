name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      python-eval: ${{ steps.filter.outputs.python-eval }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'backend/**'
              - 'mobile/**'
              - 'shared/**'
              - 'e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            python-eval:
              - 'scripts/mwf_*.py'
              - 'scripts/test_mwf_moment_eval.py'
              - 'eval/gold-scenarios.json'
              - 'eval/gold-snapshot-registry.json'
              - 'eval/gold-snapshot-registry.README.md'
              - 'eval/alignment-loop-config.yaml'
              - 'eval/icm/**'
              - 'eval/moment-types.yaml'
              - 'eval/moments/**'
              - 'eval/baselines/**'
              - 'eval/scorer/**'
              - 'eval/gold-profiles/**'
              - 'eval/prompt-versions/**'
              - 'docs/product/source-material/golden-transcripts/**'
              - '.github/workflows/ci.yml'

  ci:
    name: Checks & Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        # Use pgvector/pgvector:pg15 (not plain postgres:15) because one of
        # the Prisma migrations does CREATE EXTENSION "vector". Render's
        # managed Postgres has pgvector available; mirror that in CI.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: meetwithoutfear_user
          POSTGRES_PASSWORD: meetwithoutfear_password
          POSTGRES_DB: meetwithoutfear_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://meetwithoutfear_user:meetwithoutfear_password@localhost:5432/meetwithoutfear_test
      SHADOW_DATABASE_URL: postgresql://meetwithoutfear_user:meetwithoutfear_password@localhost:5432/meetwithoutfear_test_shadow
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules/.prisma
            ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('backend/prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=backend
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Run checks (lint & type-check)
        run: npm run check

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma

      # Scope to backend + shared. Mobile's jest setup has a pre-existing
      # `__fbBatchedBridgeConfig is not set` failure (all 42 suites red on
      # main) — tracking separately. E2E has no `test` script; it runs
      # manually via `npm run e2e`.
      - name: Run tests (backend, shared)
        run: |
          npm run test --workspace=backend
          npm run test --workspace=shared

  python-eval:
    name: Python Eval Tests
    needs: changes
    if: needs.changes.outputs.python-eval == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run cheap eval-machine tests
        run: |
          python3 -m py_compile \
            scripts/mwf_moment_eval.py \
            scripts/mwf_gold_loop.py \
            scripts/mwf_alignment_loop.py \
            scripts/mwf_add_gold_example.py \
            scripts/mwf_extract_moments.py \
            scripts/mwf_gold_profile.py \
            scripts/mwf_alignment_status.py
          python3 scripts/test_mwf_moment_eval.py

  # Gate job for branch protection — always runs, fails if any real job failed.
  # Set this as the required status check instead of the individual jobs.
  ci-success:
    name: CI Result
    if: always()
    needs: [changes, ci, python-eval]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          echo "changes:     ${{ needs.changes.result }}"
          echo "ci:          ${{ needs.ci.result }}"
          echo "python-eval: ${{ needs.python-eval.result }}"

          # Allowlist: only 'success' and 'skipped' are acceptable.
          # Catches 'failure', 'cancelled', and any unexpected state.
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.ci.result }}" \
            "${{ needs.python-eval.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Job returned unexpected result: $result"
              exit 1
            fi
          done
          echo "All checks passed (or were correctly skipped)"
