# ─── Slam Bot ─────────────────────────────────────────────────────────────────
name: slam-bot

project:
  repo: shantamg/meet-without-fear
  checkout: ~/projects/meet-without-fear
  bot_username: mwf-bot
  default_branch: main

# ─── AWS ──────────────────────────────────────────────────────────────────────
aws:
  profile: jason
  region: us-west-2
  instance_type: t3.medium
  disk_gb: 30

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  memory_threshold: 85
  load_threshold: 3.0
  disk_threshold: 90
  disk_warn_threshold: 80
  max_concurrent: 5
  reserved_interactive: 2

# ─── Process Cleanup ─────────────────────────────────────────────────────────
process_cleanup:
  idle_threshold_min: 5
  triage_min_age: 10
  hard_cap_min: 45
  agent_archive_ttl_min: 60

# ─── Slack (disabled for now — enable after creating Slack app) ───────────────
slack:
  enabled: false
  socket_mode: false
  ops_channel_env: BOT_OPS_CHANNEL_ID

# ─── GitHub ───────────────────────────────────────────────────────────────────
github:
  enabled: true
  notifications: true
  notification_interval: "* * * * *"
  labels:
    in_progress: "bot:in-progress"
    failed: "bot:failed"

# ─── Schedules ────────────────────────────────────────────────────────────────
schedules:
  health-check:
    enabled: true
    cron: "0 */6 * * *"
    prompt: "Run scheduled health check"

  bug-fix:
    enabled: true
    cron: "0 * * * *"
    prompt: "Fix untouched bug issues"
    precheck: true

# ─── Infrastructure ──────────────────────────────────────────────────────────
infrastructure:
  git_pull_interval: "* * * * *"
  stale_lock_interval: "*/5 * * * *"
  queue_drain_interval: "* * * * *"
  health_check_time: "0 6 * * *"
  label_dispatcher_interval: "* * * * *"

# ─── Claude ───────────────────────────────────────────────────────────────────
claude:
  permissions:
    allow:
      - "Bash(*)"
      - "Read(*)"
      - "Write(*)"
      - "Edit(*)"
      - "Glob(*)"
      - "Grep(*)"
      - "Agent(*)"
      - "WebFetch(*)"
      - "WebSearch(*)"

notifications:
  slack:
    enabled: false
